<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#080808"/>

  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left accent line -->
  <rect x="80" y="160" width="2" height="310" fill="#DC143C" opacity="0.4"/>

  <!-- Comment tag -->
  <text x="108" y="200" font-family="'Courier New', monospace" font-size="16" fill="#DC143C" letter-spacing="3" opacity="0.8">// PORTFOLIO</text>

  <!-- Name -->
  <text x="104" y="300" font-family="'Courier New', monospace" font-size="64" font-weight="300" fill="#f0f0f0" letter-spacing="-1">Nicolas</text>
  <text x="104" y="374" font-family="'Courier New', monospace" font-size="64" font-weight="300" fill="#DC143C" letter-spacing="-1">Herrera Santibañez</text>

  <!-- Subtitle -->
  <text x="108" y="430" font-family="'Courier New', monospace" font-size="18" fill="#b8b0c0" letter-spacing="2">Developer · Antwerp, Belgium</text>

  <!-- URL bottom right -->
  <text x="1120" y="580" font-family="'Courier New', monospace" font-size="18" fill="#DC143C" letter-spacing="1" text-anchor="end" opacity="0.8">nherrera.dev</text>

  <!-- Bottom border line -->
  <rect x="80" y="560" width="400" height="0.5" fill="rgba(255,255,255,0.08)"/>
</svg>
